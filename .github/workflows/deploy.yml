name: Deploy HelixrAuth

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /d "C:\Users\HXR8-QA-SQL\Downloads" || exit /b 1

            if not exist "helixrauth" (
              git clone -b main https://${{ secrets.REPO_PAT }}@github.com/dev5162/helixrauth.git helixrauth
            )

            cd helixrauth || exit /b 1

            git fetch origin main
            git reset --hard origin/main

            call npm ci
            if errorlevel 1 exit /b 1

            call npm run typecheck
            if errorlevel 1 exit /b 1

            call npm run build
            if errorlevel 1 exit /b 1

            call npm ci --omit=dev
            if errorlevel 1 exit /b 1

           (
            echo NODE_ENV=${{ secrets.NODE_ENV }}
            echo PORT=${{ secrets.PORT }}
            echo PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}
            echo PRODUCT_CONFIG_PATH=${{ secrets.PRODUCT_CONFIG_PATH }}
            echo CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            echo DATABASE_URL=${{ secrets.DATABASE_URL }}
            echo STATE_SECRET=${{ secrets.STATE_SECRET }}
            echo SESSION_SIGNING_ALG=${{ secrets.SESSION_SIGNING_ALG }}
            echo SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            echo SESSION_ISSUER=${{ secrets.SESSION_ISSUER }}
            echo SESSION_TTL_SECONDS=${{ secrets.SESSION_TTL_SECONDS }}
            echo HANDOFF_CODE_TTL_SECONDS=${{ secrets.HANDOFF_CODE_TTL_SECONDS }}
            ) > .env

            pm2 delete helixrauth-dev

            pm2 start cmd --name "helixrauth-dev" -- /c "node dist\src\index.js"

            pm2 startup windows -u HXR8-QA-SQL --hp C:\Users\HXR8-QA-SQL
            pm2 save

            nginx -t && nginx -s reload
          EOF